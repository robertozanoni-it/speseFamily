<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task & Expense Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                        accent: '#3b82f6'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .card-task { transition: all 0.2s ease; }
        .card-task:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        #datePickerContainer { display: none; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        .filter-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-darkBg text-slate-200 min-h-screen font-light">
    <div class="max-w-[1600px] mx-auto p-4 md:p-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-slate-800 pb-6">
            <div class="flex items-center gap-3">
                <div class="bg-accent p-2 rounded-lg shadow-lg shadow-accent/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Task & Expenses Manager</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-800 border border-slate-700">
                    <span id="themeIcon">☀️</span>
                </button>
                <div class="flex bg-slate-800 p-1 rounded-xl border border-slate-700">
                    <button onclick="exportBackup()" class="px-4 py-2 text-xs font-medium hover:text-white">Backup</button>
                    <label class="px-4 py-2 text-xs font-medium hover:text-white cursor-pointer border-l border-slate-700">
                        Carica <input type="file" id="importFile" class="hidden" onchange="importBackup(event)">
                    </label>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Colonna Sinistra -->
            <aside class="lg:col-span-4 xl:col-span-3 space-y-6">
                
                <!-- Form Nuovo/Edit Task -->
                <div class="bg-darkCard p-5 rounded-2xl border border-slate-800 shadow-xl border-t-4 border-t-accent">
                    <h2 id="formTitle" class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-accent rounded-full animate-pulse"></span>
                        Nuovo Task / Spesa
                    </h2>
                    <form id="mainForm" class="space-y-4">
                        <input type="hidden" id="editTaskId">
                        <div class="relative">
                            <button type="button" onclick="toggleCalendar()" class="w-full text-left bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm flex justify-between items-center hover:border-slate-500 transition-colors">
                                <span id="selectedDateLabel">Seleziona Data</span>
                                📅
                            </button>
                            <div id="datePickerContainer" class="absolute z-50 mt-2 p-2 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl">
                                <input type="date" id="taskDate" class="bg-slate-900 text-white p-2 rounded border border-slate-600 outline-none w-full">
                            </div>
                        </div>

                        <select id="taskCategory" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-accent appearance-none">
                            <option value="">Seleziona Categoria</option>
                        </select>

                        <select id="taskClient" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-accent appearance-none">
                            <option value="">Assegna a...</option>
                        </select>

                        <div class="grid grid-cols-2 gap-2">
                            <div class="relative">
                                <input type="number" id="taskAmount" placeholder="0.00" step="0.01" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 pl-8 text-sm focus:outline-none focus:border-accent">
                                <span class="absolute left-3 top-3.5 text-slate-500 text-xs font-bold">€</span>
                            </div>
                            <select id="taskRecurrenceType" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-accent appearance-none">
                                <option value="none">Nessuna</option>
                                <option value="weekly">Settimanale</option>
                                <option value="monthly">Mensile</option>
                                <option value="yearly">Annuale</option>
                            </select>
                        </div>
                        
                        <textarea id="taskNote" placeholder="Descrizione Task..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm h-20 focus:outline-none focus:border-accent"></textarea>

                        <div class="flex gap-2">
                            <button type="submit" id="submitBtn" class="flex-1 bg-accent hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                                Salva
                            </button>
                            <button type="button" id="cancelEdit" onclick="resetForm()" class="hidden bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg">
                                ✕
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Analisi Spese (Dropdown) -->
                <div class="bg-darkCard p-5 rounded-2xl border border-slate-800 shadow-xl">
                    <details class="group">
                        <summary class="flex justify-between items-center cursor-pointer text-sm font-bold uppercase tracking-widest text-slate-400 group-open:text-accent group-open:mb-4">
                            📊 Analisi Spese
                            <span class="transition-transform group-open:rotate-180 text-xs">▼</span>
                        </summary>
                        <div class="pt-3 border-t border-slate-700/50">
                            <div class="h-48 flex items-center justify-center relative">
                                <canvas id="expenseChart"></canvas>
                            </div>
                            <div class="flex justify-center gap-4 mt-4">
                                <button onclick="updateChart('category')" class="text-[10px] font-bold uppercase px-2 py-1 bg-slate-800 rounded hover:bg-slate-700 transition-colors">Per Categoria</button>
                                <button onclick="updateChart('client')" class="text-[10px] font-bold uppercase px-2 py-1 bg-slate-800 rounded hover:bg-slate-700 transition-colors">Per Persona</button>
                            </div>
                        </div>
                    </details>
                </div>

                <!-- Riepilogo Spese -->
                <div class="bg-darkCard p-5 rounded-2xl border border-slate-800 shadow-xl">
                    <details class="group" open>
                        <summary class="flex justify-between items-center cursor-pointer text-sm font-bold uppercase tracking-widest text-accent group-open:mb-4">
                            💰 Riepilogo
                            <span class="transition-transform group-open:rotate-180 text-xs">▼</span>
                        </summary>
                        <div class="space-y-2 pt-3 border-t border-slate-700/50">
                            <div class="bg-slate-900/60 p-3 rounded-xl border border-slate-700/50 mb-2">
                                <div class="grid grid-cols-2 gap-2 mb-2">
                                    <input type="date" id="filterStart" onchange="calculateSummaries()" class="bg-slate-800 border border-slate-700 rounded p-2 text-[10px] text-white focus:border-accent outline-none w-full">
                                    <input type="date" id="filterEnd" onchange="calculateSummaries()" class="bg-slate-800 border border-slate-700 rounded p-2 text-[10px] text-white focus:border-accent outline-none w-full">
                                </div>
                                <div id="periodTotalContainer" class="hidden bg-accent/10 border border-accent/20 p-2 rounded-lg text-center">
                                    <span id="summaryPeriod" class="font-bold text-lg text-white">€ 0.00</span>
                                </div>
                            </div>
                            <div class="flex justify-between items-center bg-slate-900/40 p-2 rounded-lg">
                                <span class="text-xs text-slate-400">Oggi</span>
                                <span id="summaryDaily" class="font-bold text-sm text-white">€ 0.00</span>
                            </div>
                            <div class="flex justify-between items-center bg-slate-900/40 p-2 rounded-lg">
                                <span class="text-xs text-slate-400">7gg</span>
                                <span id="summaryWeekly" class="font-bold text-sm text-white">€ 0.00</span>
                            </div>
                            <div class="flex justify-between items-center bg-slate-900/40 p-2 rounded-lg">
                                <span class="text-xs text-slate-400">30gg</span>
                                <span id="summaryMonthly" class="font-bold text-sm text-white">€ 0.00</span>
                            </div>
                        </div>
                    </details>
                </div>

                <!-- Gestione Categorie -->
                <div class="bg-darkCard p-5 rounded-2xl border border-slate-800 shadow-xl">
                    <details class="group">
                        <summary class="flex justify-between items-center cursor-pointer text-sm font-bold uppercase tracking-widest text-slate-400 group-open:text-accent group-open:mb-4">
                            🏷️ Categorie
                            <span class="transition-transform group-open:rotate-180 text-xs">▼</span>
                        </summary>
                        <div class="space-y-4 pt-3 border-t border-slate-700/50">
                            <div class="flex gap-2">
                                <input type="text" id="newCatName" placeholder="Nuova..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm focus:outline-none focus:border-accent">
                                <button type="button" onclick="addCategory()" class="bg-accent px-3 rounded-lg text-white font-bold hover:bg-blue-600">✓</button>
                            </div>
                            <div id="categoryListDisplay" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto custom-scrollbar pr-1"></div>
                        </div>
                    </details>
                </div>
            </aside>

            <!-- Colonna Destra -->
            <main class="lg:col-span-8 xl:col-span-9">
                <!-- Filtri Rapidi -->
                <div class="mb-6 p-4 bg-darkCard rounded-2xl border border-slate-800 shadow-lg flex flex-wrap gap-2 items-center">
                    <span class="text-[10px] font-bold uppercase text-slate-500 mr-2">Filtra:</span>
                    <button onclick="setFilter('all')" id="filter-all" class="filter-btn active px-4 py-1.5 rounded-full border border-slate-700 text-xs font-bold transition-all hover:border-accent">Tutti</button>
                    <button onclick="setFilter('expired')" id="filter-expired" class="filter-btn px-4 py-1.5 rounded-full border border-slate-700 text-xs font-bold transition-all hover:border-accent text-red-400">Scaduti</button>
                    <div class="h-4 w-px bg-slate-800 mx-1"></div>
                    <div id="clientFilterList" class="flex flex-wrap gap-2">
                        <!-- JS -->
                    </div>
                </div>

                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h2 class="text-xl font-bold text-white">Attività e Scadenze</h2>
                        <p class="text-xs text-slate-500 mt-1">Timeline delle tue attività</p>
                    </div>
                    <div class="flex gap-3">
                         <button onclick="clearCompletedTasks()" class="text-xs text-slate-400 hover:text-white underline underline-offset-4 transition-colors">
                            Pulisci Completati
                        </button>
                        <button onclick="clearPastTasks()" class="text-xs text-red-400 hover:text-red-500 underline underline-offset-4 transition-colors">
                            Svuota Passati
                        </button>
                    </div>
                </div>

                <div id="taskGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

                <div id="emptyTasks" class="hidden flex flex-col items-center justify-center p-20 opacity-30">
                    <span class="text-6xl mb-4">🎯</span>
                    <p class="text-lg">Nessun task trovato!</p>
                </div>
            </main>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-accent text-white px-6 py-3 rounded-xl shadow-2xl transition-all opacity-0 pointer-events-none translate-y-4 z-[100] font-bold">
        Feedback
    </div>

    <script>
        // Stato Iniziale
        const initialCategories = [
            "App", "Acqua", "Car", "Corsi", "Elettricità e Gas", "Food", "Internet", "Pensione", "Tasse", "Tel", "TV"
        ];

        let state = {
            tasks: JSON.parse(localStorage.getItem('app_tasks')) || [],
            clients: JSON.parse(localStorage.getItem('app_clients')) || [
                { id: 1, name: 'Roberto', color: '#ef4444' },
                { id: 2, name: 'Kate', color: '#ec4899' },
                { id: 3, name: 'Family', color: '#10b981' }
            ],
            categories: JSON.parse(localStorage.getItem('app_categories')) || initialCategories
        };

        let currentFilter = 'all'; 
        let myChart = null;
        let chartMode = 'category'; 

        window.onload = () => {
            initSelects();
            renderCategories();
            renderClientFilters();
            renderTasks();
            document.getElementById('taskDate').valueAsDate = new Date();
            updateDateLabel();
            initChart();
        };

        function initSelects() {
            const catSelect = document.getElementById('taskCategory');
            state.categories.sort((a,b) => a.localeCompare(b));
            catSelect.innerHTML = '<option value="">Seleziona Categoria</option>';
            state.categories.forEach(c => { catSelect.innerHTML += `<option value="${c}">${c}</option>`; });

            const clientSelect = document.getElementById('taskClient');
            clientSelect.innerHTML = '<option value="">Assegna a...</option>';
            state.clients.forEach(c => { clientSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
        }

        // --- FILTRI ---
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`filter-${filter}`).classList.add('active');
            renderTasks();
        }

        function renderClientFilters() {
            const list = document.getElementById('clientFilterList');
            list.innerHTML = '';
            state.clients.forEach(c => {
                const btn = document.createElement('button');
                btn.id = `filter-${c.id}`;
                btn.className = 'filter-btn px-4 py-1.5 rounded-full border border-slate-700 text-xs font-bold transition-all hover:border-accent';
                btn.style.color = c.color;
                btn.textContent = c.name;
                btn.onclick = () => setFilter(c.id);
                list.appendChild(btn);
            });
        }

        // --- GRAFICI ---
        function initChart() {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    cutout: '70%'
                }
            });
            updateChart();
        }

        function updateChart(mode = null) {
            if (mode) chartMode = mode;
            if (!myChart) return;

            let labels = [];
            let dataValues = [];
            let colors = [];

            const expenses = state.tasks.filter(t => t.amount > 0);

            if (chartMode === 'category') {
                const totals = {};
                expenses.forEach(t => { totals[t.category] = (totals[t.category] || 0) + t.amount; });
                labels = Object.keys(totals);
                dataValues = Object.values(totals);
                colors = labels.map((_, i) => `hsl(${i * (360 / Math.max(labels.length, 1))}, 70%, 60%)`);
            } else {
                const totals = {};
                expenses.forEach(t => {
                    const client = state.clients.find(c => c.id === t.clientId);
                    const name = client ? client.name : 'Generico';
                    totals[name] = (totals[name] || 0) + t.amount;
                });
                labels = Object.keys(totals);
                dataValues = Object.values(totals);
                colors = labels.map(name => {
                    const client = state.clients.find(c => c.name === name);
                    return client ? client.color : '#475569';
                });
            }

            myChart.data.labels = labels;
            myChart.data.datasets[0].data = dataValues;
            myChart.data.datasets[0].backgroundColor = colors;
            myChart.update();
        }

        // --- CORE LOGIC ---
        document.getElementById('mainForm').onsubmit = (e) => {
            e.preventDefault();
            const editId = document.getElementById('editTaskId').value;
            const date = document.getElementById('taskDate').value;
            const cat = document.getElementById('taskCategory').value;
            const clientId = document.getElementById('taskClient').value;
            const amountVal = document.getElementById('taskAmount').value;
            const recurrenceType = document.getElementById('taskRecurrenceType').value;
            const note = document.getElementById('taskNote').value;

            if (!date || !cat) { showToast("Data e Categoria obbligatorie!"); return; }

            const taskData = {
                id: editId ? parseInt(editId) : Date.now(),
                date,
                category: cat,
                clientId: clientId ? parseInt(clientId) : null,
                amount: amountVal ? parseFloat(amountVal) : null,
                note,
                recurrence: recurrenceType, // "none", "weekly", "monthly", "yearly"
                done: false
            };

            if (editId) {
                const index = state.tasks.findIndex(t => t.id === parseInt(editId));
                if(index !== -1) state.tasks[index] = taskData;
            } else {
                state.tasks.push(taskData);
            }

            saveState();
            renderTasks();
            resetForm();
            showToast(editId ? "Aggiornato" : "Salvato");
            updateChart();
        };

        function toggleTaskStatus(id) {
            const index = state.tasks.findIndex(t => t.id === id);
            if (index === -1) return;

            const task = state.tasks[index];
            task.done = !task.done;

            // RICORRENZA AVANZATA
            if (task.done && task.recurrence && task.recurrence !== 'none') {
                const nextDate = new Date(task.date);
                
                if (task.recurrence === 'weekly') {
                    nextDate.setDate(nextDate.getDate() + 7);
                } else if (task.recurrence === 'monthly') {
                    nextDate.setMonth(nextDate.getMonth() + 1);
                } else if (task.recurrence === 'yearly') {
                    nextDate.setFullYear(nextDate.getFullYear() + 1);
                }
                
                const newTask = {
                    ...task,
                    id: Date.now(),
                    date: nextDate.toISOString().split('T')[0],
                    done: false
                };
                state.tasks.push(newTask);
                showToast(`Generata ricorrenza ${task.recurrence}!`);
            }

            saveState();
            renderTasks();
            updateChart();
        }

        function renderTasks() {
            const grid = document.getElementById('taskGrid');
            const empty = document.getElementById('emptyTasks');
            grid.innerHTML = '';
            
            const today = new Date();
            today.setHours(0,0,0,0);

            let filtered = state.tasks;
            if (currentFilter === 'expired') {
                filtered = state.tasks.filter(t => new Date(t.date) < today && !t.done);
            } else if (currentFilter !== 'all') {
                filtered = state.tasks.filter(t => t.clientId === parseInt(currentFilter));
            }

            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));

            if (filtered.length === 0) empty.classList.remove('hidden');
            else empty.classList.add('hidden');

            filtered.forEach(t => {
                const client = state.clients.find(c => c.id === t.clientId);
                const color = client ? client.color : '#475569';
                const d = new Date(t.date);
                d.setHours(0,0,0,0);
                
                const dateLabel = d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' });
                const isPast = d < today && !t.done;

                const card = document.createElement('div');
                card.className = `card-task relative flex flex-col bg-darkCard border border-slate-800 p-5 rounded-2xl shadow-sm border-l-[6px] ${t.done ? 'opacity-50 grayscale-[0.5]' : ''}`;
                card.style.borderLeftColor = color;
                
                let recurrenceIcon = '';
                if (t.recurrence === 'weekly') recurrenceIcon = '📅 7';
                if (t.recurrence === 'monthly') recurrenceIcon = '🔄 1M';
                if (t.recurrence === 'yearly') recurrenceIcon = '🗓️ 1Y';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-2">
                             <button onclick="toggleTaskStatus(${t.id})" class="w-6 h-6 rounded-lg border-2 border-slate-700 flex items-center justify-center transition-all ${t.done ? 'bg-green-500 border-green-500' : 'hover:border-accent'}">
                                ${t.done ? '✓' : ''}
                            </button>
                            <span class="text-[10px] font-black uppercase tracking-widest ${isPast ? 'text-red-400 bg-red-400/10' : 'text-slate-400 bg-slate-800'} px-2 py-0.5 rounded-full border border-current/20">${dateLabel}</span>
                            ${recurrenceIcon ? `<span class="text-[9px] text-accent font-bold">${recurrenceIcon}</span>` : ''}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editTask(${t.id})" class="text-xs opacity-50 hover:opacity-100">✏️</button>
                            <button onclick="deleteTask(${t.id})" class="text-xs opacity-50 hover:opacity-100 hover:text-red-500">✕</button>
                        </div>
                    </div>
                    <h3 class="font-bold text-lg mb-1 text-white leading-tight ${t.done ? 'line-through' : ''}">${t.category}</h3>
                    <p class="text-xs text-slate-400 mb-4 line-clamp-1 italic">${t.note || ''}</p>
                    <div class="flex justify-between items-end mt-auto pt-4 border-t border-slate-800/50">
                        <div class="text-accent font-black text-xl">${t.amount ? '€' + t.amount.toFixed(2) : ''}</div>
                        <div class="text-[9px] font-black px-2 py-1 rounded-lg bg-slate-900 border border-slate-800 uppercase tracking-wider" style="color: ${color}">
                            ${client ? client.name : 'Generico'}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            calculateSummaries();
        }

        function calculateSummaries() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const filterStart = document.getElementById('filterStart').value;
            const filterEnd = document.getElementById('filterEnd').value;
            
            let daily = 0, weekly = 0, monthly = 0, period = 0;
            const msPerDay = 24 * 60 * 60 * 1000;

            state.tasks.forEach(t => {
                if (!t.amount || t.done) return;
                const taskDate = new Date(t.date);
                taskDate.setHours(0,0,0,0);
                
                const compareNow = new Date(now);
                compareNow.setHours(0,0,0,0);
                
                const diffTime = compareNow - taskDate;
                const diffDays = diffTime / msPerDay;

                if (t.date === todayStr) daily += t.amount;
                if (diffDays >= 0 && diffDays < 7) weekly += t.amount;
                if (diffDays >= 0 && diffDays < 30) monthly += t.amount;

                if (filterStart && filterEnd) {
                    const start = new Date(filterStart);
                    const end = new Date(filterEnd);
                    start.setHours(0,0,0,0);
                    end.setHours(0,0,0,0);
                    if (taskDate >= start && taskDate <= end) period += t.amount;
                }
            });

            document.getElementById('summaryDaily').textContent = `€ ${daily.toFixed(2)}`;
            document.getElementById('summaryWeekly').textContent = `€ ${weekly.toFixed(2)}`;
            document.getElementById('summaryMonthly').textContent = `€ ${monthly.toFixed(2)}`;
            
            const periodContainer = document.getElementById('periodTotalContainer');
            if (filterStart && filterEnd) {
                periodContainer.classList.remove('hidden');
                document.getElementById('summaryPeriod').textContent = `€ ${period.toFixed(2)}`;
            } else { periodContainer.classList.add('hidden'); }
        }

        // --- UTILS ---
        function renderCategories() {
            const list = document.getElementById('categoryListDisplay');
            list.innerHTML = '';
            state.categories.sort((a,b) => a.localeCompare(b)).forEach(c => {
                list.innerHTML += `<span class="bg-slate-800 text-slate-400 px-2 py-1 rounded-lg text-[9px] font-bold border border-slate-700 flex items-center gap-1 group">
                    ${c}
                    <button type="button" onclick="removeCategory('${c}')" class="text-red-500 opacity-0 group-hover:opacity-100">✕</button>
                </span>`;
            });
        }

        function addCategory() {
            const input = document.getElementById('newCatName');
            if (!input.value.trim() || state.categories.includes(input.value.trim())) return;
            state.categories.push(input.value.trim());
            saveState(); renderCategories(); initSelects(); input.value = '';
        }

        function removeCategory(name) {
            state.categories = state.categories.filter(c => c !== name);
            saveState(); renderCategories(); initSelects();
        }

        function editTask(id) {
            const t = state.tasks.find(t => t.id === id);
            if (!t) return;
            document.getElementById('editTaskId').value = t.id;
            document.getElementById('taskDate').value = t.date;
            document.getElementById('taskCategory').value = t.category;
            document.getElementById('taskClient').value = t.clientId || "";
            document.getElementById('taskAmount').value = t.amount || "";
            document.getElementById('taskRecurrenceType').value = t.recurrence || "none";
            document.getElementById('taskNote').value = t.note || "";
            document.getElementById('formTitle').textContent = "Modifica Task";
            document.getElementById('submitBtn').textContent = "Aggiorna";
            document.getElementById('cancelEdit').classList.remove('hidden');
            updateDateLabel();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('mainForm').reset();
            document.getElementById('editTaskId').value = "";
            document.getElementById('formTitle').textContent = "Nuovo Task / Spesa";
            document.getElementById('submitBtn').textContent = "Salva";
            document.getElementById('cancelEdit').classList.add('hidden');
            document.getElementById('taskDate').valueAsDate = new Date();
            updateDateLabel();
        }

        function deleteTask(id) {
            state.tasks = state.tasks.filter(t => t.id !== id);
            saveState(); renderTasks(); updateChart(); showToast("Eliminato");
        }

        function clearPastTasks() {
            const today = new Date().setHours(0,0,0,0);
            state.tasks = state.tasks.filter(t => new Date(t.date) >= today || t.done);
            saveState(); renderTasks(); showToast("Pulizia completata");
        }

        function clearCompletedTasks() {
            state.tasks = state.tasks.filter(t => !t.done);
            saveState(); renderTasks(); updateChart(); showToast("Completati rimossi");
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        }

        function toggleCalendar() {
            const c = document.getElementById('datePickerContainer');
            c.style.display = c.style.display === 'block' ? 'none' : 'block';
        }

        function updateDateLabel() {
            const val = document.getElementById('taskDate').value;
            if (val) {
                document.getElementById('selectedDateLabel').textContent = new Date(val).toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' });
                document.getElementById('datePickerContainer').style.display = 'none';
            }
        }

        function saveState() {
            localStorage.setItem('app_tasks', JSON.stringify(state.tasks));
            localStorage.setItem('app_clients', JSON.stringify(state.clients));
            localStorage.setItem('app_categories', JSON.stringify(state.categories));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('opacity-0', 'translate-y-4');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.add('opacity-0', 'translate-y-4');
                t.classList.remove('opacity-100', 'translate-y-0');
            }, 2000);
        }

        function exportBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `manager_backup_${new Date().toISOString().split('T')[0]}.json`);
            dl.click();
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(imported.tasks && imported.clients) {
                        state = imported;
                        saveState();
                        location.reload();
                    }
                } catch (err) { showToast("File non valido"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
